name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Default-deny the workflow token. Every job in this workflow is read-only.
permissions:
  contents: read

jobs:
  build-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # Consumer re-pin regressions verify that immutable revision pins
          # resolve from the declared release tag. A depth-1/no-tags checkout
          # makes that offline invariant untestable and previously failed the
          # suite before any assertion could report why.
          fetch-depth: 0

      # Pinned to the workspace rust-version (Cargo.toml: rust-version = "1.88.0").
      # 1.88 is the floor: transitive deps in Cargo.lock (darling, time/time-core,
      # rcgen, serde_with, home) declare rust-version 1.88, and edition2024 deps
      # need >=1.85 — the old 1.81.0 pin could not even parse their manifests.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, pinned 2026-07-10
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --all --check

      # ncp-python (PyO3) is excluded from the cargo gate: its test binary needs
      # libpython on the runtime linker path, and it is built/tested via maturin
      # + pytest (the PyPI path), not the cargo workspace. See ROADMAP.md.
      # --locked everywhere: CI must build the exact committed Cargo.lock, so a
      # dependency cannot silently float to a new (possibly yanked/breaking)
      # version between the lock commit and the run (supply-chain hygiene).
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --exclude ncp-python --all-targets --locked -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --exclude ncp-python --locked

      # Smoke the C++ demo against the built library: it exercises the C ABI
      # (version, keys, codec, validate) end-to-end from a real C++ binary. The
      # demo exits nonzero on any mismatch, so a stale version string or a broken
      # ABI surface fails the gate. (Previously this demo was never run in CI,
      # which let a version "0.1" vs "0.5" mismatch ship unnoticed.)
      - name: C++ demo smoke (build + run)
        run: |
          c++ -std=c++17 -I ncp-cpp/include ncp-cpp/examples/demo.cpp \
              -L target/debug -lncp_cpp -Wl,-rpath,target/debug -o /tmp/ncp_demo
          /tmp/ncp_demo

      - name: Test workspace
        run: cargo test --workspace --exclude ncp-python --locked

      # ncp-python is excluded from the cargo build/test gate (its cdylib needs a
      # libpython link step the workspace build does not set up); `cargo check` has no
      # link step, so it stays here as a fast type-check. The binding is actually
      # COMPILED + IMPORTED + behaviorally gated in the dedicated `ncp-python` job
      # below (maturin wheel + corpus + smoke).
      - name: Check ncp-python (type-check; no Python link)
        run: cargo check -p ncp-python --locked

      # Regenerate + ensure the TS bindings build (ncp-core `ts` feature).
      - name: Test ncp-core with TS bindings
        run: cargo test -p ncp-core --features ts --locked

      # Package tests must not accidentally borrow root-only fixtures or licenses.
      # Assemble all five publishable crates, assert their archive surfaces, then
      # test core/Zenoh/C-ABI and type-check Python/gateway from extracted archives.
      # Temporary Cargo patches resolve the not-yet-published exact 0.7 NCP crates
      # locally without changing the manifests that will be uploaded.
      - name: Rust crate archives are self-contained
        run: python3 scripts/check_rust_packages.py --offline

      - name: Rust-generated TS bindings must be committed
        run: git diff --exit-code -- ncp-core/bindings

      # Guard the protobuf IDL against the JSON Schemas (field-set + enum
      # wire-string parity). Closes the third side of the serde/schema/proto
      # triangle; dependency-free, stdlib Python only.
      - name: Proto <-> JSON-Schema parity
        run: python3 scripts/check_proto_schema_parity.py

      # Conformance corpus: golden message instances validated against the
      # schemas — the language-agnostic interop corpus any peer can run.
      - name: Conformance vectors
        run: python3 scripts/check_conformance_vectors.py

      # Frozen JSON-wire baseline: extends buf's proto-only guarantee to the whole
      # serde/Pydantic JSON wire — the CURRENT schemas must be ADDITIVELY compatible
      # with the snapshot frozen at conformance/baseline/v<wire>.0 (no removed field /
      # enum value, no field made required, no type change within a wire version).
      - name: Frozen JSON-wire baseline (additive-only)
        run: python3 scripts/check_wire_baseline.py

      # Behavioral conformance: the same decision corpus the Rust reference is
      # pinned to (ncp-core/tests/behavior_conformance.rs, run by the cargo test
      # step above) replayed through the Python binding. In THIS job the binding is
      # not built, so it skips with exit 0; the dedicated `ncp-python` job below
      # runs it with NCP_REQUIRE_BINDING=1 so the binding's parity HARD-gates there.
      - name: Behavioral vectors (Python binding)
        run: python3 scripts/check_behavior_vectors.py

      # P0/#7: the per-plane ACL template must use valid Zenoh tokens and keep
      # command-plane PUT authority restricted to the `commander` subject.
      - name: ACL template guard
        run: python3 scripts/check_acl_template.py

      # The live verifier must never regress to treating local put() success as
      # authorization evidence. Its offline truth-table/config self-test pins the
      # nonce-delivery, same-plane baseline, strict-client, and no-cert logic; a
      # real router/certificate run remains a deployment gate.
      - name: ACL deployment verifier self-test
        run: python3 scripts/verify_acl_deployment.py --self-test

      # Safety: every committed schema field DEFAULT must equal the normative Rust
      # reference (ncp-core). The parity guard checks field-sets/enums but not
      # defaults; this closes that gap (it caught CommandFrame.mode defaulting to the
      # actuating "active" instead of the fail-safe "hold"). Runs the proto-first
      # generator, so it needs the schema feature build.
      - name: Schema-default safety guard
        run: python3 scripts/check_schema_defaults.py

      - name: Consumer pin descriptor regressions
        run: scripts/test_consumer_pins.sh

      # NCP owns its schema (proto-first): regenerate from the ncp-core serde reference
      # types and assert the committed schemas/ are byte-identical, so a Rust type change
      # that is not re-generated fails CI rather than silently drifting the JSON projection.
      - name: Schemas freshly generated from the Rust reference
        run: |
          cargo run -q -p ncp-core --features schema --bin gen-schemas -- "${RUNNER_TEMP:-/tmp}/ncp-schemas-fresh"
          diff -ru "${RUNNER_TEMP:-/tmp}/ncp-schemas-fresh" schemas/ -x README.md

  ncp-python:
    name: ncp-python (maturin build + behavioral gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, pinned 2026-07-10
      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install build + test deps
        run: pip install maturin==1.14.1 pytest==9.1.1
      # Build the abi3 wheel from the EXACT committed lock (--locked) and install it,
      # so the `ncp` binding is actually compiled + importable in CI — it was
      # previously only `cargo check`ed, so the binding's RUNTIME conformance to
      # ncp-core was never exercised (a regression of the CommandFrame.mode
      # ACTIVE-vs-HOLD class could have shipped green).
      - name: Build + install the ncp wheel (abi3, --locked)
        run: |
          maturin build -m ncp-python/Cargo.toml --features extension-module --locked --out target/wheels
          pip install --no-index --find-links target/wheels ncp
      # HARD-gate the shared behavioral corpus through the binding: NCP_REQUIRE_BINDING=1
      # turns the skip into a failure, so this step cannot pass green if the wheel did
      # not build/import (no skip-as-pass). Proves ncp-python decides identically to the
      # Rust/C++ peers on check_version / contract_status / validate / govern.
      - name: Behavioral conformance (binding, required)
        run: NCP_REQUIRE_BINDING=1 python scripts/check_behavior_vectors.py
      # Codec round-trip smoke (encode_rates -> decode_command) — the one binding path
      # the decision corpus does not cover — plus the exported contract pins.
      - name: Binding smoke test
        run: python -m pytest ncp-python/tests -q

  buf:
    name: buf lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ github.token }}
      # The normative wire IDL (proto/ncp.proto) must build and lint. Language-
      # agnostic compat detection no single-language binding can provide.
      - name: buf build
        run: buf build
      - name: buf lint
        run: buf lint
      # Gate the JSON + binary wire against the FIRST tag of the current wire
      # version (v0.7.0, the wire-0.7 baseline). A WIRE/WIRE_JSON-breaking change
      # fails here and must bump the version (see VERSIONING.md).
      # IMPORTANT: do NOT bump this baseline on a patch/minor-doc release — the
      # whole v0.7.x lineage is checked against the wire-0.7 origin, so a break
      # introduced anywhere in 0.7.x is still caught. Move it ONLY when cutting a
      # new wire. Prior baselines: v0.4.0 (wire 0.4), v0.5.0 (the mode string→enum
      # promotion), and v0.6.0 (mandatory version/seq acceptance rules). v0.7.0
      # adds the typed error envelope and completes the reserved bulk-observation
      # metadata, so it must become the binary compatibility origin for 0.7.
      - name: buf breaking (vs v0.7.0)
        uses: bufbuild/buf-breaking-action@c57b3d842a5c3f3b454756ef65305a50a587c5ba # v1.1.4
        with:
          against: "https://github.com/sepahead/NCP.git#tag=v0.7.0,subdir=."

  ts-dist:
    name: ts dist up-to-date
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      # The published @sepahead/ncp package ships the prebuilt ncp-ts/dist (it is
      # git-tracked). Rebuild it from source and fail if it drifts from what was
      # committed — so a source change (e.g. a wire-version bump) that wasn't
      # rebuilt into dist cannot ship a stale artifact. typescript is pinned in
      # package.json for a reproducible build.
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Sync generated sources + rebuild TS dist
        run: |
          bun run sync
          bun run build
      - name: generated TS sources and dist must match the committed build
        run: git diff --exit-code -- ncp-ts/src/generated ncp-ts/dist
      # Behavioral parity: replay the shared decision corpus
      # (conformance/behavior/vectors.json) through the freshly-built TS peer, so
      # ncp-ts's checkVersion / contractStatus / scientific-boundary decisions are
      # pinned to the same outcomes as the Rust/Python/C++ peers. Read-only (does not
      # mutate dist, so it cannot trip the diff gate above).
      - name: TS behavioral conformance
        run: bun run check:behavior
      - name: TS WebSocket lifecycle regression
        run: bun run check:ws
      - name: npm packed-package smoke
        run: bun run check:package

  version-coherence:
    name: version coherence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Read-only guard: the Cargo workspace version, package.json version, and
      # CITATION.cff version must all agree. Catches a release that bumps one
      # metadata file but forgets another (the "stale metadata / moved tag"
      # footgun). On a tag push it also asserts the tag peels to the commit it
      # claims and that the tag's version matches the in-tree version.
      - name: Internal version coherence (HEAD)
        run: scripts/check-version-coherence.sh
      - name: Version coherence (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: scripts/check-version-coherence.sh "${GITHUB_REF_NAME}"
      # check-consumer-pins.sh verifies that every downstream consumer pins a single
      # agreed NCP tag. Consumers are DISCOVERED (any sibling with a `.ncp-consumer`
      # descriptor) — NCP names none of them. Siblings are not checked out in CI, so
      # run it only if at least one descriptor is present; otherwise inform and skip
      # (it is a release-time guard run from a full local tree).
      - name: Consumer pin coherence (discovered siblings, if present)
        run: |
          base="$(cd .. && pwd)"
          if ls "$base"/*/.ncp-consumer >/dev/null 2>&1; then
            echo "Registered consumers detected under $base — checking pins."
            scripts/check-consumer-pins.sh "" "$base"
          else
            echo "No registered consumers (no */.ncp-consumer) under $base in this CI checkout — skipping."
            echo "Run scripts/check-consumer-pins.sh locally from a full tree before a tag bump."
          fi

  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Supply-chain gate over the committed Cargo.lock: RustSec vulnerability +
      # yanked advisories, a default-deny license allowlist, banned/wildcard deps,
      # and source restrictions. Config + documented advisory ignores: deny.toml.
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
