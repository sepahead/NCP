name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

# The release workflow is a packaging dry-run and needs no write authority.
permissions:
  contents: read

jobs:
  publish-dry-run:
    name: cargo publish (dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # Pinned to the workspace rust-version (Cargo.toml: rust-version = "1.88.0").
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, pinned 2026-07-10
        with:
          toolchain: "1.88.0"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Guard: the pushed tag (vX.Y.Z) MUST equal the workspace version in
      # Cargo.toml. A mistagged release (tag ahead of or behind the manifest) fails
      # HERE, before any packaging — never publishing a version-mismatched crate.
      - name: Tag matches workspace version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ver="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "tag=v$tag  manifest=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::release tag v$tag does not match workspace version $ver"
            exit 1
          fi

      # Build all five archives and inspect their exact contents. Core, Zenoh,
      # and the C ABI are cargo-tested from extraction; Python and gateway are
      # cargo-checked. Exact unpublished NCP dependencies are resolved through
      # temporary local Cargo patches only, so published dependency semantics
      # remain the versioned crates.io requirements in the normalized manifests.
      - name: Verify Rust package archives
        run: python3 scripts/check_rust_packages.py

      # Real publishing is enabled later, once crates.io ownership is established
      # and a CARGO_REGISTRY_TOKEN secret is configured. Until then this job is
      # dry-run only and performs no real publish and no token usage.
