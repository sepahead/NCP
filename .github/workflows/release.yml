name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

# The current candidate's release hold blocks this packaging dry-run before any
# archive construction. The workflow needs no write authority.
permissions:
  contents: read

jobs:
  publish-dry-run:
    name: held packaging dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          # Release identity and immutable-baseline checks inspect annotated tag
          # objects, peeled commits, and historical trees. A shallow checkout
          # cannot prove those boundaries.
          fetch-depth: 0

      # A tag is not authorization. The candidate registry deliberately retains
      # release_allowed=false while external gates are NOT RUN, so every current
      # v* tag attempt fails here before toolchain setup or archive construction.
      # Unlocking publication requires a separately reviewed, evidence-bound
      # release-policy change; merely changing a manifest version cannot bypass it.
      - name: Enforce candidate release hold
        run: python3 scripts/check_release_gates.py --require-release-allowed

      # Pinned to the workspace rust-version (Cargo.toml: rust-version = "1.88.0").
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, pinned 2026-07-10
        with:
          toolchain: "1.88.0"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Use the same strict parser and annotated-tag identity checks as the main
      # release gate. This binds every version-bearing manifest, the tag object,
      # its peeled commit, and the checked-out HEAD before archive construction.
      - name: Verify release identity and immutable contract gates
        run: |
          scripts/check-version-coherence.sh "${GITHUB_REF_NAME}"
          python3 -m unittest -v e2e.test_bounded_json
          python3 scripts/check_dependency_exposure.py --self-test
          python3 scripts/check_released_baselines.py
          python3 scripts/check_wire_baseline.py
          python3 scripts/check_wire_baseline.py --verify-current-cut
          python3 scripts/check_buf_breaking.py
          python3 scripts/generate_conformance_manifest.py
          python3 scripts/generate_contract_manifest.py
          python3 scripts/check_release_gates.py --require-release-allowed

      # Build all five archives and inspect their exact contents. Core, Zenoh,
      # and the C ABI are cargo-tested from extraction; Python and gateway are
      # cargo-checked. Exact unpublished NCP dependencies are resolved through
      # temporary local Cargo patches only, so published dependency semantics
      # remain the versioned crates.io requirements in the normalized manifests.
      - name: Verify Rust package archives
        run: python3 scripts/check_rust_packages.py

      # Real publishing is enabled later, once crates.io ownership is established
      # and a CARGO_REGISTRY_TOKEN secret is configured. Until then this job is
      # dry-run only and performs no real publish and no token usage.
