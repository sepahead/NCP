version: v2
# PREVIEW generation — these outputs are NOT yet the shipped SDKs:
#   - Rust  : ncp-core stays the hand-written serde reference impl (behavior +
#             wire). prost output is for evaluating the eventual proto-native rewire.
#   - TS    : ncp-ts currently ships ts-rs-generated types; ts-proto is the
#             proto-native alternative for the @sepahead/ncp package.
#   - Python: the shipped `ncp-python` surface wraps ncp-core through PyO3;
#             this generated tree is an optional future protobuf-codec path only.
# Output goes to gen/ (gitignored). Run `npx @bufbuild/buf generate`.
# See proto/ncp.proto header for the normativity model.
clean: true
plugins:
  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    revision: 1
    out: gen/rust
  - remote: buf.build/protocolbuffers/python:v35.1
    revision: 1
    out: gen/python
  - remote: buf.build/community/stephenh-ts-proto:v2.12.0
    revision: 1
    out: gen/ts
    opt:
      - outputServices=false
      - esModuleInterop=true
