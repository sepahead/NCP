// Neuro-Cybernetic Protocol (NCP) 1.0.0-rc.1 candidate — protobuf IDL.
// Normative field-number/message-shape layer; unreleased and non-certifying.
//
// The precedence registry in `README.md` and `contract/manifest.v1.json` governs:
// `contract/*.v1.json` (excluding the derived, non-self-hashed
// `contract/manifest.v1.json`) comes first, then this IDL, generated JSON Schemas,
// normative prose, and the mandatory corpus. This file is therefore the source of
// truth for protobuf field numbers and message shapes, not the sole source for
// authority, limits, security, or behavioral acceptance. Other representations are
// generated from the Rust projection or conformance-checked against it:
//
//   - preview protobuf bindings (Rust/prost, TS/ts-proto, Python) — generated via
//     buf under ignored `gen/`; these are not the shipped runtime,
//   - JSON Schemas — generated from the Rust reference and kept bidirectionally
//     in parity with this file (including enum wire strings),
//   - Rust serde reference types; Python/C wrap them and TS types derive via ts-rs.
//
// `ncp-core` implements behavior; it is informative rather than another normative
// layer. Parity is CI-enforced:
//   - `scripts/check_proto_schema_parity.py` — this `.proto` <-> JSON Schema
//     (field-set + enum wire-string parity); run it after editing this file,
//   - `ncp-core/tests/conformance.rs`        — Rust serde <-> JSON Schema.
//
// IMPORTANT — ProtoJSON is NOT the NCP JSON wire for enums. Canonical protobuf
// JSON emits an enum's *constant name* ("V_M"); the NCP JSON wire uses the string
// in `schemas/` ("V_m"). Each proto enum value annotates its JSON wire string as
// `// wire string "..."`, and a protobuf-JSON peer MUST map enums through that
// table. Binary peers use the field number and are unaffected.
//
// Wire conventions:
//   - every message carries a `kind` string discriminator and an `ncp_version`
//     string ("1.0"). Versions have one or two canonical ASCII-decimal u64
//     components with no leading zeroes; `1` means `1.0`. Stable peers accept
//     every well-formed same-major 1.x version, while pre-1.0 peers require an
//     exact (major, minor) match. Since wire 0.6 both fields are MANDATORY on
//     every message (an absent version/kind no longer defaults to the receiver's
//     own — `required_fields()`/`validate()` and the JSON Schemas' `required` +
//     exact stable-major `pattern` enforce it end to end),
//   - stream/source discipline (introduced in wire 0.8, retained by 1.0): every
//     data-plane frame and periodically published status carries
//     its OWN identity+position in `stream` (a `StreamPosition{epoch, seq}`) and, when
//     it was driven by another frame, a `source` `StreamPosition` referencing it.
//     `stream.seq` starts at 1 per `stream.epoch`, strictly increasing, and is the
//     ONLY sequence loss/`LinkMonitor` accounting and `ActionBuffer` dedup/supersession
//     read; `stream.epoch` is an opaque per-incarnation id (equality-only, never
//     ordered). `source` echoes the DRIVING frame's `stream` (a `command_frame`/plane
//     `observation_frame` copies the driving `sensor_frame.stream`) and is correlation
//     ONLY — never loss accounting; its seq may repeat or jump under intentional
//     decimation. No top-level `seq` remains (retired + `reserved` on every message,
//     no alias); the old observation-plane `seq == 0` pull/RPC sentinel is replaced by
//     `source` ABSENCE. One receiver/publisher declaration is bound to one epoch and
//     strictly increasing sequence high-water forever: expiry never authorizes a
//     lower seq or foreign epoch. A restart requires fresh route/session declaration
//     state; the retired declaration rejects every replay, including ESTOP, before
//     latch mutation. After authenticated current-session ingress, local non-Active
//     handling clears buffered actuation before replay checks and ESTOP additionally
//     latches. A local clock rewind HOLDs through
//     catch-up until a fresh command arrives. A `session.generation` (server-issued on
//     `session_opened`) scopes all of a session's streams so a stale-session frame is
//     rejectable. Wire 0.8 keeps the 0.7 JSON int64 exact ±(2^53-1) range guard,
//     lossless additive enum strings, explicit honesty-boundary fields, and versioned
//     ErrorFrame replies. These acceptance/shape changes are gated by both the version
//     string and the updated contract hash,
//   - integer fields (ids, sizes, seq, seed) are int64, matching the Rust `i64`
//     types and the JSON `"integer"` schema type; the JSON projection emits them
//     as JSON numbers (a deliberate, human-readable deviation from ProtoJSON,
//     which emits int64 as strings), so values above 2^53 lose precision in a
//     binary64/JS consumer — every JSON integer field is now range-guarded at
//     ingress. JSON-Schema integer semantics apply: 1, 1.0, and 1e0 are the same
//     integral value; fractions are invalid. int64-as-JSON-numbers is the RATIFIED v0.5
//     wire decision (sepahead/NCP#5 resolved: KEEP numbers — a second wire break to
//     adopt ProtoJSON int64-as-strings is not worth it for a range-guarded edge),
//   - `record`/`stimulus` on OpenSession are NESTED specs (RecordSpec /
//     StimulusSpec), each wrapping a repeated list of targets,
//   - unknown fields are ignored on deserialize (additive forward-compatibility
//     within a compatible wire version; pre-1.0 that is an exact major.minor).
//   - every envelope field named `t` is seconds on THIS frame publisher's local
//     monotonic clock, scoped to its `stream.epoch`. It is meaningful only within that
//     stream and MUST NOT be compared across peers; use `source` for cross-plane
//     correlation. Wire 0.8: `t` is ALWAYS the current publisher's creation time — a
//     command/observation no longer smuggles the sensor's `t` into `t`; the driving
//     sensor's time travels explicitly in `source_t`. `sim_time_ms` and
//     Observation.times are simulation milliseconds.
//
// NCP is transport-agnostic, but this 1.0 candidate stabilizes only Zenoh. The
// WebSocket/JSON implementation is experimental. The `NeuroSim` service below is
// an IDL preview retained for field-number planning; gRPC/protobuf runtime transport
// is excluded from the stable 1.0 scope and is never the per-tick data plane. See
// `docs/1.0-scope.md`, RATIONALE.md, and PERFORMANCE.md.
//
// Lifecycle RPC verbs use distinct queryable keys so an ACL can authorize them
// independently. These structured annotations are part of CONTRACT_HASH:
// wire key "{realm}/rpc/open_session"
// wire key "{realm}/rpc/step_request"
// wire key "{realm}/rpc/run_request"
// wire key "{realm}/rpc/close_session"

syntax = "proto3";

package ncp.v1;

// ───────────────────────── primitives ─────────────────────────

message ChannelValue {
  repeated double data = 1;
  string unit = 2;            // optional; "" = unset
}

// ───────────────────────── stream identity (wire 0.8) ─────────────────────────

// One exact position in ONE logical stream incarnation. Reused wherever a frame's
// own identity, or a reference to another frame, is needed. Wire 0.8 splits the old
// overloaded top-level `seq` into `stream` (this frame's delivery position — the only
// thing loss/LinkMonitor accounting reads) and `source` (a reference to the frame
// that drove this one — correlation only, never loss accounting).
message StreamPosition {
  // Opaque identifier for one logical stream incarnation. REQUIRED. Canonical form:
  // lowercase UUIDv4 from a CSPRNG. EQUALITY SEMANTICS ONLY — never ordered, never a
  // timestamp, never an authority term; a different epoch does not by itself prove a
  // publisher is newer or authorized. A logical stream is scoped by session generation
  // + authenticated publisher + concrete routing key + message kind; mint a fresh
  // epoch per logical stream and per restart.
  string epoch = 1;
  // Position within the incarnation. REQUIRED. Range 1 .. 2^53-1. Starts at 1 per
  // epoch and never wraps. In the stable Zenoh binding, admission owns one allocator
  // across Active/HOLD/ESTOP; a pre-publication latest-wins replacement may inherit
  // its pending slot, but once publication is attempted that position is consumed.
  // A delivery-ambiguous recovery is a new logical fail-safe at a new position,
  // never an exact-position retry.
  int64 seq = 2;
  // Field number 3 is reserved BY POLICY (this registry note — deliberately NOT
  // proto-`reserved`, so it can be added later) for a future `publisher_id` bound to
  // the authenticated transport principal. Do not use tag 3 for anything else.
}

// One live session incarnation. `session_id` (where present) remains the routing
// name; this server-issued `generation` distinguishes one opening of that id from a
// later reuse, so a stale-session frame is rejectable. The tuple
// (session_id, generation) identifies the live instance.
message SessionRef {
  string generation = 1;   // server-issued opaque incarnation id (canonical UUIDv4); "" = unset
}

// Enums. NOTE on forward-compat: Rust decoding preserves an unrecognized, non-empty
// JSON enum string verbatim so diagnostics and decode -> encode relays do not rewrite
// it. Preservation does NOT make every enum same-major extensible: every enum below
// except Mode is closed because at least one path requires interpretation. Unknown
// closed values fail semantic validation. Mode alone is open and fail-safe: safety
// treats every mode other than ACTIVE as HOLD, an invariant every same-major additive
// mode must preserve. The catch-all is deliberately not a proto constant; proto3
// already preserves unknown numeric enum values.
// Closed: record/observation paths must understand the observable.
enum Observable {
  OBSERVABLE_UNSPECIFIED = 0;
  V_M = 1;                    // wire string "V_m"
  SPIKES = 2;                 // wire string "spikes"
  RATE = 3;                   // wire string "rate"
  WEIGHT = 4;                 // wire string "weight"
  BINARY_STATE = 5;           // wire string "binary_state" — spin_detector (binary neurons)
}

// Closed operational enum: unknown values cannot select stimulus behavior.
enum StimulusKind {
  STIMULUS_KIND_UNSPECIFIED = 0;
  CURRENT_PA = 1;             // wire string "current_pA"
  RATE_HZ = 2;                // wire string "rate_hz"
  SPIKE_TIMES = 3;            // wire string "spike_times"
  WEIGHT_SET = 4;             // wire string "weight_set"
  RATE_INJECT = 5;            // wire string "rate_inject" — continuous-rate drive (rate neurons)
}

// Closed operational enum: unknown values cannot select model-loading behavior.
enum NetworkRefKind {
  NETWORK_REF_KIND_UNSPECIFIED = 0;
  HANDLE = 1;     // wire string "handle" — backend-issued compiled-module / script id
  BUILTIN = 2;    // wire string "builtin" — backend built-in model name
  MODEL_ID = 3;   // wire string "model_id" — backend knowledge-graph / paper-derived model id
  SPEC = 4;       // wire string "spec"
}

// Closed: bindings may use the role for routing or authorization.
enum EntityRole {
  ENTITY_ROLE_UNSPECIFIED = 0;
  SYSTEM = 1;                 // wire string "system"
  ACTOR = 2;                  // wire string "actor"
  SENSOR = 3;                 // wire string "sensor"
  ACTUATOR = 4;               // wire string "actuator"
}

// Closed capability enum: every negotiated channel shape must be understood.
enum ChannelKind {
  CHANNEL_KIND_UNSPECIFIED = 0;
  SCALAR = 1;                 // wire string "scalar"
  VEC3 = 2;                   // wire string "vec3"
  QUAT = 3;                   // wire string "quat"
  ARRAY = 4;                  // wire string "array"
}

// Closed negotiation enum; unknown values never weaken a requirement.
enum ChannelRequirement {
  CHANNEL_REQUIREMENT_UNSPECIFIED = 0; // wire string "unknown" — never authorizes action
  CHANNEL_REQUIRED = 1;                // wire string "required"
  CHANNEL_OPTIONAL = 2;                // wire string "optional"
}

// Closed negotiation enum; unknown values never acquire peer authority.
enum Role {
  ROLE_UNSPECIFIED = 0;
  CONTROLLER = 1;             // wire string "controller"
  PLANT = 2;                  // wire string "plant"
  OBSERVER = 3;               // wire string "observer"
  OPERATOR = 4;               // wire string "operator"
}

// Security and authority enums are CLOSED. Their unspecified values map to the
// explicit JSON string "unknown" and never inherit authority.
enum Plane {
  PLANE_UNSPECIFIED = 0;      // wire string "unknown"
  CONTROL = 1;                // wire string "control"
  PERCEPTION = 2;             // wire string "perception"
  ACTION = 3;                 // wire string "action"
  OBSERVATION = 4;            // wire string "observation"
}

enum PrincipalRole {
  PRINCIPAL_ROLE_UNSPECIFIED = 0; // wire string "unknown"
  COMMANDER = 1;                  // wire string "commander"
  BODY = 2;                       // wire string "body"
  PRINCIPAL_OBSERVER = 3;         // wire string "observer"
  PRINCIPAL_OPERATOR = 4;         // wire string "operator"
}

enum LifecycleState {
  LIFECYCLE_STATE_UNSPECIFIED = 0; // wire string "unknown"
  CLOSED = 1;                      // wire string "closed"
  OPENING = 2;                     // wire string "opening"
  LIFECYCLE_INIT = 3;              // wire string "init"
  LIFECYCLE_ACTIVE = 4;            // wire string "active"
  LIFECYCLE_HOLD = 5;              // wire string "hold"
  LIFECYCLE_ESTOP = 6;             // wire string "estop"
  CLOSING = 7;                     // wire string "closing"
  RECONNECTING = 8;                // wire string "reconnecting"
  FAILED = 9;                      // wire string "failed"
}

enum OperationOutcome {
  OPERATION_OUTCOME_UNSPECIFIED = 0; // wire string "unknown"
  SUCCEEDED = 1;                     // wire string "succeeded"
  REJECTED = 2;                      // wire string "rejected"
  CANCELLED = 3;                     // wire string "cancelled"
  OUTCOME_UNKNOWN = 4;               // wire string "outcome_unknown"
}

// Sole open enum. Every unknown/additive value is non-authorizing and governed as HOLD.
enum Mode {
  MODE_UNSPECIFIED = 0;
  INIT = 1;                   // wire string "init"
  ACTIVE = 2;                 // wire string "active"
  HOLD = 3;                   // wire string "hold"
  ESTOP = 4;                  // wire string "estop"
}

// Closed operational enum: unknown values cannot select execution behavior.
enum SimMode {
  SIM_MODE_UNSPECIFIED = 0;
  STREAM = 1;                 // wire string "stream"
  BATCH = 2;                  // wire string "batch"
}

// Payload identity is a claim only. A transport adapter MUST bind it to the
// authenticated peer before it can authorize any operation.
message IdentityClaim {
  string principal_id = 1;
  string entity_id = 2;
  PrincipalRole role = 3;
  Plane plane = 4;
}

message GatewayAttribution {
  string gateway_id = 1;
  string source_wire = 2;
}

message AuthorityLease {
  string session_epoch = 1;
  uint64 term = 2;
  string lease_id = 3;
  string issuer_principal_id = 4;
  string holder_principal_id = 5;
  string holder_entity_id = 6;
  int64 issued_at_utc_ms = 7;
  int64 expires_at_utc_ms = 8;
}

message OperationContext {
  string operation_id = 1;
  string request_digest = 2;
  string session_epoch = 3;
  uint64 expected_state_version = 4;
  int64 deadline_utc_ms = 5;
  bool retry = 6;
}

message ResponderReceipt {
  string operation_id = 1;
  string request_digest = 2;
  string result_digest = 3;
  OperationOutcome outcome = 4;
  uint64 state_version = 5;
  int64 committed_at_utc_ms = 6;
  string responder_principal_id = 7;
  string responder_entity_id = 8;
}

// ───────────────────────── entity addressing ─────────────────────────

message EntityRef {
  string path = 1;             // e.g. "uav1/sensor/cam0"
  EntityRole role = 2;         // system|actor|sensor|actuator
  map<string, string> meta = 3;
}

message EntityBinding {
  EntityRef entity = 1;
  string port = 2;
  string direction = 3;        // "stimulus" | "record"
}

// ───────────────────────── session config ─────────────────────────

message NetworkRef {
  NetworkRefKind kind = 1;
  string ref = 2;              // builtin name or compiled_module_id (kind=handle)
  string model_name = 3;       // kind=handle: which registered model; "" = unset
  map<string, int64> population_sizes = 4;
  map<string, double> params = 5;
}

message RecordTarget {
  string port = 1;             // client name for this recording
  string target = 2;           // population/group name in the network
  Observable observable = 3;
  repeated int64 ids = 4;      // empty = all
  double cadence_ms = 5;
  repeated string recordables = 6;  // generic named multimeter recordables (g_ex, g_in, w, rate, …)
}

// Nested spec wrapper (matches the JSON: record.targets / stimulus.targets).
message RecordSpec {
  repeated RecordTarget targets = 1;
}

message StimulusTarget {
  string port = 1;
  string target = 2;
  StimulusKind kind = 3;
  repeated int64 ids = 4;
  map<string, double> params = 5;  // named params (e.g. siegert drift_factor / diffusion_factor)
}

message StimulusSpec {
  repeated StimulusTarget targets = 1;
}

message SimConfig {
  double dt_ms = 1;
  double chunk_ms = 2;
  int64 seed = 3;              // 0 = unset
  SimMode mode = 4;           // wire strings "stream" | "batch"
  double duration_ms = 5;
}

message SimProvenance {
  string network_ref = 1;
  string backend = 2;
  int64 seed = 3;
  bool calibrated_posterior = 4;   // always false
  bool is_simulation_output = 5;   // always true
  bool advisory_only = 6;
  string note = 7;
}

// ───────────────────────── session messages ─────────────────────────

message OpenSession {
  string ncp_version = 1;
  string kind = 2;                  // "open_session"
  string session_id = 3;
  NetworkRef network = 4;
  RecordSpec record = 5;            // nested spec, not a flat repeated list
  StimulusSpec stimulus = 6;        // nested spec, not a flat repeated list
  SimConfig sim = 7;
  repeated EntityBinding bindings = 8;
  // Caller's contract-hash (ncp_core::CONTRACT_HASH — FNV-1a of the canonicalized
  // proto). Carried in the handshake as an ADVISORY identity signal: a peer LOGS a
  // mismatch (it does not reject — ncp_version is the hard gate), symmetric with
  // SessionOpened.contract_hash. Empty/absent = not advertised. (#P1 handshake)
  string contract_hash = 9;
  IdentityClaim identity = 10;
  string security_profile = 11;
  string security_state_digest = 12;
  bool gateway_permitted = 13;
  GatewayAttribution gateway = 14; // optional; present only on translated payloads
}

message SessionOpened {
  string ncp_version = 1;
  string kind = 2;                  // "session_opened"
  string session_id = 3;
  bool ok = 4;
  string backend = 5;
  map<string, int64> resolved = 6;     // target -> neuron count
  SimProvenance provenance = 7;
  string error = 8;
  // Server's contract-hash, the reply half of the handshake (see
  // OpenSession.contract_hash). A client treats a hash difference as ADVISORY
  // (logged, not rejected). Empty/absent = not advertised. (#P1 handshake)
  string contract_hash = 9;
  // (0.8) Server-ISSUED session incarnation, present IFF ok == true (absent on a failed
  // open). Clients echo `session.generation` on every subsequent session-scoped frame;
  // it distinguishes one opening of this `session_id` from a later reuse, so a
  // stale-session frame is rejectable.
  SessionRef session = 10;
  IdentityClaim identity = 11;
  string security_profile = 12;
  string security_state_digest = 13;
  bool gateway_permitted = 14;
  GatewayAttribution gateway = 15; // optional; present only on translated payloads
  // Authoritative state after open; seeds the first mutation's
  // OperationContext.expected_state_version.
  uint64 state_version = 16;
}

message StimulusFrame {
  string ncp_version = 1;
  string kind = 2;                  // "stimulus_frame"
  string session_id = 3;
  double t = 4;                     // producer-local monotonic seconds
  map<string, ChannelValue> values = 5;   // keyed by stimulus port
  SessionRef session = 6;           // (0.8) REQUIRED; nested in Step/Run it MUST equal the outer (session_id, generation)
}

message StepRequest {
  string ncp_version = 1;
  string kind = 2;                  // "step_request"
  string session_id = 3;
  double advance_ms = 4;            // 0 = use SimConfig.chunk_ms
  StimulusFrame stimulus = 5;
  SessionRef session = 6;           // (0.8) REQUIRED: targets an open incarnation; (session_id, generation) must be the live pair
  OperationContext operation = 7;
  AuthorityLease authority = 8;
}

message RunRequest {
  string ncp_version = 1;
  string kind = 2;                  // "run_request"
  string session_id = 3;
  double duration_ms = 4;
  StimulusFrame stimulus = 5;
  SessionRef session = 6;           // (0.8) REQUIRED: targets an open incarnation; (session_id, generation) must be the live pair
  OperationContext operation = 7;
  AuthorityLease authority = 8;
}

message Observation {
  string port = 1;
  string target = 2;
  Observable observable = 3;
  repeated double times = 4;     // simulation ms: analog sample times OR spike times
  repeated double values = 5;    // analog values (parallel to times)
  repeated int64 senders = 6;    // spike sender ids (parallel to times)
  string unit = 7;
  string recordable = 8;         // when set, names this specific recorded series (g_ex, w, …) and is
                                 // AUTHORITATIVE for it; `observable` is then the record target's family
                                 // hint, not this series' type (so g_ex under a V_m target is not a V_m
                                 // reading). "" = the series itself is `observable`.
}

message ObservationFrame {
  string ncp_version = 1;
  string kind = 2;                        // "observation_frame"
  string session_id = 3;
  reserved 4;                              // wire 0.8: retired the overloaded top-level `seq` (now `stream` + `source`)
  reserved "seq";
  double t = 5;                            // THIS observation publisher's local monotonic seconds (0.8: not the sensor's t)
  double sim_time_ms = 6;
  map<string, Observation> records = 7;   // keyed by unique record-series name; Observation.port names the negotiated port
  bool calibrated_posterior = 8;          // always false
  bool is_simulation_output = 9;          // always true
  StreamPosition stream = 10;             // REQUIRED (0.8): this observation stream's incarnation + position
  StreamPosition source = 11;             // driving SensorFrame.stream on the observation PLANE; the cross-plane join key.
                                          // OMITTED for the pull/RPC reply form (absence replaces the old seq==0 sentinel).
  double source_t = 12;                    // driving SensorFrame.t; 0 = unset
  SessionRef session = 13;
  ResponderReceipt receipt = 14;            // optional; present for mutating RPC replies
}

// (#6) Reserved complete envelope for a future bulk numeric observation carried
// as a packed little-endian COLUMN BLOCK. The metadata stays in this thin envelope;
// `block` carries the columns (`times`/`values`/`senders`) as the
// self-describing block defined by `ncp-core::bulk` (magic "NCPB", version 1:
// header + per-column directory of byte offsets + name pool + LE column data).
//
// BOUNDARY: the block codec is implemented and golden-vector-pinned for local/offline
// use, but this envelope is not yet implemented across all SDKs and MUST NOT be
// published as a transport frame. JSON `ObservationFrame` is the only shipped
// observation-plane representation. A future negotiated implementation may use this
// envelope only on observation/analysis, never the hot action loop, and must ship
// encode/decode/conformance in every binding first.
message BulkObservation {
  string ncp_version = 1;
  string kind = 2;                        // "bulk_observation"
  string port = 3;
  string target = 4;
  Observable observable = 5;
  string unit = 6;
  string recordable = 7;                  // (#10) named recordable this series carries ("" = `observable`)
  bytes block = 8;                        // packed LE column block ("NCPB" v1); columns: times,values,senders
  string session_id = 9;
  reserved 10;                             // wire 0.8: retired the overloaded top-level `seq` (now `stream` + `source`)
  reserved "seq";
  double t = 11;                         // THIS observation publisher's local monotonic seconds
  bool calibrated_posterior = 12;         // always false
  bool is_simulation_output = 13;         // always true
  StreamPosition stream = 14;             // REQUIRED (0.8): this bulk-observation stream's incarnation + position
  StreamPosition source = 15;             // driving trigger/watermark position; OMITTED for the pull/RPC form
  double source_t = 16;                    // driving SensorFrame.t; 0 = unset
  SessionRef session = 17;
}

message CloseSession {
  string ncp_version = 1;
  string kind = 2;                  // "close_session"
  string session_id = 3;
  SessionRef session = 4;           // (0.8) REQUIRED: a delayed close for an old incarnation must not close a reopened session
  OperationContext operation = 5;
  AuthorityLease authority = 6;
}

message SessionClosed {
  string ncp_version = 1;
  string kind = 2;                  // "session_closed"
  string session_id = 3;
  bool ok = 4;
  SessionRef session = 5;           // (0.8) the incarnation this close concerns; a delayed reply must be attributable to it
  ResponderReceipt receipt = 6;
}

// A failure reply is a first-class versioned message; stale/unversioned error
// payloads must not bypass the reply identity gate.
message ErrorFrame {
  string ncp_version = 1;
  string kind = 2;                  // "error"
  string error = 3;
  string session_id = 4;            // optional; empty = request carried no session
  string request_kind = 5;          // optional; kind of the rejected request
  // (0.8) Optional correlation context copied from the rejected request. Presence does
  // NOT assert this generation exists or is active. Echo it (WITH session_id) only when
  // the request carried a structurally valid SessionRef; omit BOTH for OpenSession
  // failures, missing/malformed generation, and non-session errors (copy both or neither).
  SessionRef session = 6;
  ResponderReceipt receipt = 7;     // optional; committed rejection/cancellation only
  string code = 8;                  // REQUIRED: exact member of contract/errors.v1.json
}

// ───────────────────────── closed-loop control (layered) ─────────────────────────

message ChannelSpec {
  string name = 1;
  ChannelKind kind = 2;
  string unit = 3;                  // "" = unset
  int64 size = 4;                   // 0 = unset
  ChannelRequirement requirement = 5; // REQUIRED in canonical JSON; unknown/absent fails closed
  string description = 6;           // "" = unset
}

message SafetyLimits {
  double max_speed_mps = 1;         // 0 = unset
  double max_tilt_rad = 2;          // 0 = unset
  double geofence_radius_m = 3;     // 0 = unset
  double command_timeout_ms = 4;
}

// Handshake: who the controller is and what it speaks.
message Capabilities {
  string ncp_version = 1;
  string kind = 2;                  // "capabilities"
  string controller_id = 3;
  Role role = 4;
  double control_rate_hz = 5;
  repeated ChannelSpec sensor_channels = 6;
  repeated ChannelSpec command_channels = 7;
  string codec_id = 8;              // "" = unset
  SafetyLimits safety = 9;
  IdentityClaim identity = 10;
  string security_profile = 11;
  string security_state_digest = 12;
  repeated string stable_capabilities = 13;
  bool gateway_permitted = 14;
  string plant_profile_digest = 15; // optional; empty = controller/non-plant peer
  GatewayAttribution gateway = 16;  // optional; present only on translated payloads
}

message SensorFrame {
  string ncp_version = 1;
  string kind = 2;                  // "sensor_frame"
  reserved 3;                        // wire 0.8: retired the overloaded top-level `seq` (now `stream`)
  reserved "seq";
  double t = 4;                     // THIS publisher's local monotonic seconds (scoped to stream.epoch)
  string frame_id = 5;               // default "world"; geofence position/velocity frames MUST match
  map<string, ChannelValue> channels = 6;
  StreamPosition stream = 7;         // REQUIRED (0.8): this sensor stream's incarnation + position. It is the
                                     // ORIGIN — has no `source`; downstream command/observation `source` copies THIS.
  SessionRef session = 8;            // the session incarnation this stream belongs to
  string session_id = 9;             // (0.8) logical session id (transport-neutral); MUST equal the routing key's session segment
}

// One predictive setpoint step (proto can't nest a map in a repeated field).
message SetpointStep { map<string, ChannelValue> channels = 1; }

message CommandFrame {
  string ncp_version = 1;
  string kind = 2;                  // "command_frame"
  reserved 3;                        // wire 0.8: retired the overloaded top-level `seq` (now `stream` + `source`)
  reserved "seq";
  double t = 4;                     // THIS command publisher's local monotonic seconds (0.8: NOT the sensor's t)
  string frame_id = 5;               // default "world"; geofence position/velocity frames MUST match
  Mode mode = 6;              // wire strings init|active|hold|estop
  double ttl_ms = 7;
  map<string, ChannelValue> channels = 8;        // tick 0
  repeated SetpointStep horizon = 9;             // packetized predictive control: tick i+1;
                                                 // N <= ttl_ms/horizon_dt_ms and <= 65,536
  double horizon_dt_ms = 10;                      // 0 = unset (legacy single-step)
  StreamPosition stream = 11;        // REQUIRED (0.8): this command stream's incarnation + position — the ONLY
                                     // sequence LinkMonitor/ActionBuffer read for loss/dedup/supersession.
  StreamPosition source = 12;        // driving SensorFrame.stream; REQUIRED for a closed-loop Active command,
                                     // omitted for explicitly-negotiated open-loop/autonomous frames. Correlation
                                     // only — never loss accounting; source.seq may repeat or jump.
  double source_t = 13;              // driving SensorFrame.t, for source-age checks; 0 = unset
  SessionRef session = 14;           // the session incarnation this command stream belongs to
  string session_id = 15;            // (0.8) logical session id (transport-neutral); MUST equal the routing key's session segment
  AuthorityLease authority = 16;     // Active requires it; authenticated ESTOP may omit it
}

// Controller -> plant / telemetry: loop health and mode.
message ControlStatus {
  string ncp_version = 1;
  string kind = 2;                  // "control_status"
  reserved 3;                        // wire 0.8: retired top-level `seq` (now `stream`)
  reserved "seq";
  double t = 4;                     // THIS status publisher's local monotonic seconds
  Mode mode = 5;              // wire strings init|active|hold|estop
  double sim_time_ms = 6;
  double loop_latency_ms = 7;
  bool safety_ok = 8;
  string note = 9;                  // "" = unset
  StreamPosition stream = 10;        // REQUIRED when periodically published: this status stream's position;
                                     // seq starts at 1 and strictly advances (0 is unstamped, never telemetry).
                                     // (An `applied_command` StreamPosition lands with the command-ack increment.)
  SessionRef session = 11;
  string session_id = 12;            // (0.8) logical session id (transport-neutral)
}

// Link-health telemetry from the seq-gap / CUSUM monitor (control plane).
message LinkStatus {
  string ncp_version = 1;
  string kind = 2;                  // "link_status"
  string session_id = 3;
  double t = 4;                     // THIS status publisher's local monotonic seconds
  reserved 5;                        // wire 0.8: retired ambiguous `last_seq` (F-16 — see observed_stream + last_arrival_seq)
  reserved "last_seq";
  int64 received = 6;         // distinct in-epoch positions recognized as delivered (excludes duplicates), since attach/reset
  int64 lost = 7;             // currently-unresolved gaps in the observed interval; MAY decrease when a late arrival reconciles
  double loss_rate = 8;       // lost / observed sequence span (NOT lost / raw arrival count)
  bool burst = 9;             // sustained loss (possible jam) -> fail safe
  StreamPosition stream = 10;        // REQUIRED: the LinkStatus stream's OWN incarnation + positive position — a consumer
                                     // validates THIS before trusting any reported burst/loss/high-water state.
  StreamPosition observed_stream = 11; // the MONITORED stream: its epoch + forward high-water seq. Absent before the first
                                     // valid observed frame (presence <=> last_arrival_seq present).
  optional int64 last_arrival_seq = 12; // F-16: seq of the last valid in-epoch ARRIVAL (< observed_stream.seq under
                                     // reordering; == it on ordinary forward arrival). Range starts at 1, cannot exceed
                                     // observed_stream.seq, and presence tracks observed_stream.
  SessionRef session = 13;
  // Tags 14, 15 intentionally free: bounded reorder/duplicate CLASSIFICATION counters
  // are deferred — the current algorithm cannot report them identically across bindings
  // (see docs/wire-0.8-stream-identity.md); they land additively with precise names.
}

// ───────────────────────── service ─────────────────────────

service NeuroSim {
  // Simulation-service RPCs (unary).
  rpc Open(OpenSession) returns (SessionOpened);
  rpc Step(StepRequest) returns (ObservationFrame);
  rpc Run(RunRequest) returns (ObservationFrame);
  rpc Close(CloseSession) returns (SessionClosed);

  // Stream observations as a session advances under a stimulus schedule.
  rpc Observe(StepRequest) returns (stream ObservationFrame);

  // Closed-loop control: the plant streams sensor frames; the commander streams
  // back command frames. (The commander emits NCP commands; the project's own
  // adapter maps them to its actuators — keeping project specifics out of the core.)
  rpc Control(stream SensorFrame) returns (stream CommandFrame);
}
