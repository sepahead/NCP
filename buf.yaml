version: v2
# The normative wire IDL lives in proto/ncp.proto (see its header). Buf gives us
# language-agnostic lint + breaking-change detection across every peer at once —
# the compat guarantee no single-language binding (ts-rs, PyO3) can provide.
modules:
  - path: proto
lint:
  use:
    - BASIC
  except:
    # The repo keeps a single flat proto/ncp.proto rather than a
    # package-mirrored directory tree (ncp/v1/…); revisit if the IDL is
    # ever split into multiple files.
    - PACKAGE_DIRECTORY_MATCH
  # NCP enum values are bare wire-aligned constants (V_M, CURRENT_PA, …) whose
  # JSON wire string is annotated inline; they are intentionally not prefixed
  # with the enum name. ENUM_VALUE_PREFIX/ZERO_VALUE_SUFFIX are STANDARD-only and
  # already excluded by using BASIC.
breaking:
  # Guard the JSON + binary wire across a published stable-major line. The
  # release gate selects the latest same-major entry from the verified annotated-
  # release registry and passes its peeled commit to Buf. The initial v1 candidate
  # has no v1 release to compare with and must report that fact explicitly; it is
  # intentionally not compared with incompatible package ncp.v0.
  use:
    - WIRE_JSON
    - WIRE
