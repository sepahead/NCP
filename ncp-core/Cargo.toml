[package]
name = "ncp-core"
description = "Neuro-Cybernetic Protocol (NCP) — pure protocol core: wire types, version guard, key scheme, rate codec, safety governor, in-process bus. The normative Rust reference."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
keywords = ["spiking-neural-network", "neurorobotics", "protocol", "nest-simulator", "robotics"]
categories = ["science::robotics", "simulation", "api-bindings"]
readme = "README.md"
documentation = "https://docs.rs/ncp-core"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
# TypeScript type generation (Rust is the single source of truth for TS types).
# `cargo test --features ts` writes ncp-core/bindings/*.ts. Off by default.
# serde-compat so ts-rs honours the existing `#[serde(rename)]` (e.g. "V_m", "ref").
ts-rs = { version = "12", features = ["serde-compat"], optional = true }
# JSON-Schema generation from the Rust serde types — NCP OWNS its schema projection
# proto-first (the serde types are the conformance-locked reference impl of the proto,
# and their `#[serde(rename)]` carry the enum wire strings). `cargo run --features schema
# --bin gen-schemas` regenerates schemas/*.schema.json. Off by default. Replaces the
# previous inversion where schemas were generated from a downstream consumer's models.
schemars = { version = "1", optional = true }

[features]
default = []
ts = ["dep:ts-rs"]
schema = ["dep:schemars"]

[[bin]]
name = "gen-schemas"
path = "src/bin/gen-schemas.rs"
required-features = ["schema"]
